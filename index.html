<!doctype html>
<html lang="en">
  <!-- Language: English -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="" />
    <meta name="author" content="Emanuel Lewis" />
    <meta
      name="keywords"
      content="spots, web design, html, css, project, tripleten"
    />
    <title>Spots Page</title>

    <link rel="icon" href="favicon.ico" />

    <link rel="stylesheet" href="pages/index.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <img src="./images/Logo.svg" alt="Spots logo" class="header__logo" />
      </header>
      <main class="content">
        <section class="profile">
          <div class="profile__content">
            <img
              src="./images/avatar.jpg"
              alt="Avatar Image"
              class="profile__avatar"
            />
            <div class="profile__column">
              <h1 class="profile__name">Bessie Coleman</h1>
              <p class="profile__description">Civil Avator</p>
              <button class="profile__edit-button">
                <img
                  src="./images/edit__profile-icon.svg"
                  alt=""
                  class="profile__edit-icon"
                />
                Edit Profile
              </button>
            </div>
          </div>
          <button class="profile__new-post-button">
            <img
              src="./images/logo__button.svg"
              alt=""
              class="porfile__new-post-button-image"
            />
            New Post
          </button>
        </section>
        <section class="cards"></section>
      </main>
      <footer class="footer"></footer>
    </div>
  </body>
</html>
