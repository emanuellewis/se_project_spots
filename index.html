<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="" />
    <meta name="author" content="Emanuel Lewis" />
    <meta
      name="keywords"
      content="spots, web design, html, css, project, tripleten"
    />
    <title>Spots Page</title>

    <link rel="icon" href="favicon.ico" />

    <link rel="stylesheet" href="pages/index.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <img src="./images/Logo.svg" alt="Spots logo" class="header__logo" />
      </header>
      <main class="content">
        <section class="profile">
          <div class="profile__content">
            <img
              src="./images/avatar.jpg"
              alt="Avatar Image"
              class="profile__avatar"
            />
            <div class="profile__column">
              <h1 class="profile__name">Bessie Coleman</h1>
              <p class="profile__description">Civil Avator</p>
              <button class="profile__edit-button" type="button">
                <img
                  src="./images/edit__profile-icon.svg"
                  alt="Profile Edit Icon"
                  class="profile__edit-icon"
                />
                Edit Profile
              </button>
            </div>
          </div>
          <button class="profile__new-post-button" type="button">
            <img
              src="./images/logo__button.svg"
              alt="Profile New Post Button"
              class="profile__new-post-button-image"
            />
            New Post
          </button>
        </section>

        <section class="cards">
          <ul class="cards__list"></ul>
        </section>

        <template id="template-card">
          <li class="card">
            <button
              class="card__delete-btn"
              type="button"
              aria-label="Delete Button"
            ></button>
            <img src="" alt="" class="card__image" />
            <h2 class="card__description">
              <span class="card__title"></span>
              <button
                class="card__description-button"
                type="button"
                aria-label="Like Button"
              ></button>
            </h2>
          </li>
        </template>
      </main>

      <footer class="footer">
        <p class="footer__information">2026 © Spots</p>
      </footer>

      <div class="modal" id="edit-profile-modal">
        <div class="modal__content">
          <button class="modal__close-btn" type="button">
            <img src="./images/close-btn.svg" alt="Close Button" />
          </button>
          <h2 class="modal__title">Edit Profile</h2>
          <form class="modal__form" novalidate>
            <label for="profile-name_input" class="modal__label">
              Name
              <input
                id="profile-name_input"
                type="text"
                class="modal__input"
                placeholder="Type your name"
                required
                minlength="2"
                maxlength="40"
              />
              <span id="profile-name_input-error" class="modal__error"></span>
            </label>

            <label for="profile-description_input" class="modal__label">
              Description
              <input
                id="profile-description_input"
                type="text"
                class="modal__input"
                placeholder="Describe yourself"
                required
                minlength="2"
                maxlength="200"
              />
              <span
                id="profile-description_input-error"
                class="modal__error"
              ></span>
            </label>
            <button type="submit" class="modal__submit-btn">Save</button>
          </form>
        </div>
      </div>

      <div class="modal" id="new-post-modal">
        <div class="modal__content">
          <button class="modal__close-btn" type="button">
            <img src="./images/close-btn.svg" alt="Close Button" />
          </button>
          <h2 class="modal__title">New post</h2>
          <form class="modal__form" novalidate>
            <label for="new-post-image_input" class="modal__label">
              Image link
              <input
                id="new-post-image_input"
                type="url"
                class="modal__input"
                placeholder="Paste a link the picture"
                required
              />
              <span id="new-post-image_input-error" class="modal__error"></span>
            </label>

            <label for="new-post-image_caption" class="modal__label">
              Caption
              <input
                id="new-post-image_caption"
                type="text"
                class="modal__input"
                placeholder="Type your caption"
                required
                minlength="2"
                maxlength="30"
              />
              <span
                id="new-post-image_caption-error"
                class="modal__error"
              ></span>
            </label>
            <button type="submit" class="modal__submit-btn">Save</button>
          </form>
        </div>
      </div>

      <div class="modal" id="preview-modal">
        <div class="modal__preview">
          <button class="modal__preview-close-btn" type="button">
            <img src="./images/close-button-white.svg" alt="Close Button" />
          </button>
          <img
            id="modal__preview-img"
            src="#"
            alt=""
            class="modal__preview-image"
          />
          <p class="modal__preview-caption"></p>
        </div>
      </div>

      <script src="./scripts/validation.js"></script>
      <script src="./scripts/index.js"></script>
    </div>
  </body>
</html>
