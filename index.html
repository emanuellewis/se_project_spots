<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="" />
    <meta name="author" content="Emanuel Lewis" />
    <meta
      name="keywords"
      content="spots, web design, html, css, project, tripleten"
    />
    <title>Spots Page</title>

    <link rel="icon" href="favicon.ico" />

    <link rel="stylesheet" href="pages/index.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <img src="./images/Logo.svg" alt="Spots logo" class="header__logo" />
      </header>
      <main class="content">
        <section class="profile">
          <div class="profile__content">
            <img
              src="./images/avatar.jpg"
              alt="Avatar Image"
              class="profile__avatar"
            />
            <div class="profile__column">
              <h1 class="profile__name">Bessie Coleman</h1>
              <p class="profile__description">Civil Avator</p>
              <button class="profile__edit-button" type="button">
                <img
                  src="./images/edit__profile-icon.svg"
                  alt=""
                  class="profile__edit-icon"
                />
                Edit Profile
              </button>
            </div>
          </div>
          <button class="profile__new-post-button" type="button">
            <img
              src="./images/logo__button.svg"
              alt=""
              class="profile__new-post-button-image"
            />
            New Post
          </button>
        </section>

        <section class="cards">
          <div class="card">
            <img
              src="./images/1-photo-by-moritz-feldmann-from-pexels.jpg"
              alt=""
              class="card__image"
            />
            <h2 class="card__description">
              Val Thorens
              <button class="card__description-button" type="button">
                <img
                  src="./images/State=Hover.png"
                  alt="Like Button"
                  class="card__description-button-img"
                />
              </button>
            </h2>
          </div>
          <div class="card">
            <img
              src="./images/2-photo-by-ceiline-from-pexels.jpg"
              alt=""
              class="card__image"
            />
            <h2 class="card__description">
              Restaurant terrace
              <button class="card__description-button" type="button">
                <img
                  src="./images/State=Hover.png"
                  alt="Like Button"
                  class="card__description-button-img"
                />
              </button>
            </h2>
          </div>

          <div class="card">
            <img
              src="./images/3-photo-by-tubanur-dogan-from-pexels.jpg"
              alt=""
              class="card__image"
            />
            <h2 class="card__description">
              An outdoor cafe
              <button class="card__description-button" type="button">
                <img
                  src="./images/State=Hover.png"
                  alt="Like Button"
                  class="card__description-button-img"
                />
              </button>
            </h2>
          </div>

          <div class="card">
            <img
              src="./images/4-photo-by-maurice-laschet-from-pexels.jpg"
              alt=""
              class="card__image"
            />
            <h2 class="card__description">
              A very long bridge, over the forest...

              <button class="card__description-button" type="button">
                <img
                  src="./images/State=Hover.png"
                  alt="Like Button"
                  class="card__description-button-img"
                />
              </button>
            </h2>
          </div>

          <div class="card">
            <img
              src="./images/5-photo-by-van-anh-nguyen-from-pexels.jpg"
              alt=""
              class="card__image"
            />
            <h2 class="card__description">
              Tunnel with morning light
              <button class="card__description-button" type="button">
                <img
                  src="./images/State=Hover.png"
                  alt="Like Button"
                  class="card__description-button-img"
                />
              </button>
            </h2>
          </div>

          <div class="card">
            <img
              src="./images/6-photo-by-moritz-feldmann-from-pexels.jpg"
              alt=""
              class="card__image"
            />
            <h2 class="card__description">
              Mountain house
              <button class="card__description-button" type="button">
                <img
                  src="./images/State=Hover.png"
                  alt="Like Button"
                  class="card__description-button-img"
                />
              </button>
            </h2>
          </div>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__information">2026 © Spots</p>
      </footer>

      <div class="modal" id="edit-profile-modal">
        <div class="modal__content">
          <button class="modal__close-btn" type="button">
            <img src="./images/close-btn.svg" alt="Close Button" />
          </button>
          <h2 class="modal__title">Edit Profile</h2>
          <form class="modal__form">
            <label for="profile-name_input" class="modal__label">
              Name
              <input
                id="profile-name_input"
                type="text"
                class="modal__input"
                placeholder="Type your name"
              />
            </label>

            <label for="profile-description_input" class="modal__label">
              Description
              <input
                id="profile-description_input"
                type="text"
                class="modal__input"
                placeholder="Describe yourself"
              />
            </label>
            <button type="submit" class="modal__submit-btn">Save</button>
          </form>
        </div>
      </div>

      <div class="modal" id="new-post-modal">
        <div class="modal__content">
          <button class="modal__close-btn" type="button">
            <img src="./images/close-btn.svg" alt="Close Button" />
          </button>
          <h2 class="modal__title">New post</h2>
          <form class="modal__form">
            <label for="new-post-image_input" class="modal__label">
              Image link
              <input
                id="new-post-image_input"
                type="text"
                class="modal__input"
                placeholder="Paste a link the picture"
              />
            </label>

            <label for="new-post-image_caption" class="modal__label">
              Caption
              <input
                id="new-post-image_caption"
                type="text"
                class="modal__input"
                placeholder="Type your caption"
              />
            </label>
            <button type="submit" class="modal__submit-btn">Save</button>
          </form>
        </div>
      </div>
    </div>
    <script src="./scripts/index.js"></script>
  </body>
</html>
