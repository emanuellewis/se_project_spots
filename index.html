<!doctype html>
<html lang="en">
  <!-- Language: English -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="" />
    <meta name="author" content="Emanuel Lewis" />
    <meta
      name="keywords"
      content="spots, web design, html, css, project, tripleten"
    />
    <title>Spots Page</title>

    <link rel="icon" href="favicon.ico" />

    <link rel="stylesheet" href="pages/index.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <img src="./images/Logo.svg" alt="Spots logo" class="header__logo" />
      </header>
      <main class="content">
        <section class="profile">
          <div class="profile__content">
            <img
              src="./images/avatar.jpg"
              alt="Avatar Image"
              class="profile__avatar"
            />
            <div class="profile__column">
              <h1 class="profile__name">Bessie Coleman</h1>
              <p class="profile__description">Civil Avator</p>
              <button class="profile__edit-button">
                <img
                  src="./images/edit__profile-icon.svg"
                  alt=""
                  class="profile__edit-icon"
                />
                Edit Profile
              </button>
            </div>
          </div>
          <button class="profile__new-post-button">
            <img
              src="./images/logo__button.svg"
              alt=""
              class="profile__new-post-button-image"
            />
            New Post
          </button>
        </section>
        <section class="cards">
          <div class="card">
            <img
              src="./images/1-photo-by-moritz-feldmann-from-pexels.jpg"
              alt=""
              class="card__image"
            />
            <p class="card__description">Val Thorens</p>
          </div>

          <div class="card">
            <img
              src="./images/2-photo-by-ceiline-from-pexels.jpg"
              alt=""
              class="card__image"
            />
            <p class="card__description">Restaurant terrace</p>
          </div>

          <div class="card">
            <img
              src="./images/3-photo-by-tubanur-dogan-from-pexels.jpg"
              alt=""
              class="card__image"
            />
            <p class="card__description">An outdoor cafe</p>
          </div>

          <div class="card">
            <img
              src="./images/4-photo-by-maurice-laschet-from-pexels.jpg"
              alt=""
              class="card__image"
            />
            <p class="card__description">
              A very long bridge, over the forest...
            </p>
          </div>

          <div class="card">
            <img
              src="./images/5-photo-by-van-anh-nguyen-from-pexels.jpg"
              alt=""
              class="card__image"
            />
            <p class="card__description">Tunnel with morning light</p>
          </div>

          <div class="card">
            <img
              src="./images/6-photo-by-moritz-feldmann-from-pexels.jpg"
              alt=""
              class="card__image"
            />
            <p class="card__description">Mountain house</p>
          </div>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__information">2026 © Spots</p>
      </footer>
    </div>
  </body>
</html>
